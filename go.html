<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarketOdds</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#fafafa;color:#111;display:flex;align-items:center;justify-content:center;height:100vh;text-align:center;padding:1.5rem}
.card{max-width:380px;width:100%;background:#fff;border-radius:20px;padding:2.5rem 2rem;box-shadow:0 8px 24px rgba(0,0,0,.05),0 2px 4px rgba(0,0,0,.08)}
h1{font-size:1.5rem;font-weight:700;margin-bottom:.5rem;letter-spacing:-.3px}
p{color:#555;font-size:.95rem;line-height:1.6;margin-bottom:1.5rem}
.spinner{width:32px;height:32px;border:3px solid #e5e7eb;border-top-color:#7B68EE;border-radius:50%;animation:s .6s linear infinite;margin:0 auto 1.25rem}
@keyframes s{to{transform:rotate(360deg)}}
.btn{display:block;width:100%;padding:14px 20px;font-size:1rem;font-weight:700;color:#fff;background:#7B68EE;border:none;border-radius:12px;cursor:pointer;text-decoration:none;font-family:inherit;margin-bottom:.75rem;transition:background .2s}
.btn:hover{background:#6A58DD}
.hint{font-size:.8rem;color:#888;line-height:1.5}
.powered{font-size:.75rem;color:#aaa;margin-top:1.25rem}
.hidden{position:absolute;left:-9999px;top:-9999px;width:1px;height:1px;opacity:0}
</style>
</head>
<body>
<div class="card">
  <h1>MarketOdds</h1>
  <p>Tap below to view all opportunities in Safari for the best experience.</p>
  <a id="btn" class="btn" href="https://marketodds.ai/smartlink">Open in Safari</a>
  <p class="hint">Or tap <strong>⋯</strong> top-right → <strong>Open in Safari</strong></p>
  <p class="powered">MarketOdds [.ai]</p>
</div>
<iframe id="iframe" class="hidden" sandbox="allow-top-navigation"></iframe>
<script>
(function(){
  var DEST = 'https://marketodds.ai/smartlink';
  var ua = navigator.userAgent || '';
  var isInApp = /Instagram|FBAN|FBAV|Messenger|Line\/|Snapchat|TikTok|Pinterest|WeChat|LinkedInApp|WebView| wv\)/i.test(ua);

  if (!isInApp) {
    window.location.replace(DEST);
    return;
  }

  var isIOS = /iPhone|iPad|iPod/i.test(ua);
  var isAndroid = /Android/i.test(ua);
  var stripped = DEST.replace(/^https?:\/\//, '');

  var btn = document.getElementById('btn');

  if (isIOS) {
    var safariUrl = 'x-safari-https://' + stripped;
    btn.href = safariUrl;

    // Also try iframe-based redirect without navigating main page
    try {
      var iframe = document.getElementById('iframe');
      if (iframe) iframe.src = safariUrl;
    } catch(e) {}
  } else if (isAndroid) {
    btn.href = 'intent://' + stripped + '#Intent;scheme=https;end';
  }
})();
</script>
</body>
</html>
