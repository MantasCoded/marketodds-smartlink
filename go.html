<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarketOdds</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#fafafa;color:#111;display:flex;align-items:center;justify-content:center;height:100vh;text-align:center;padding:1.5rem}
.card{max-width:380px;width:100%;background:#fff;border-radius:20px;padding:2.5rem 2rem;box-shadow:0 8px 24px rgba(0,0,0,.05),0 2px 4px rgba(0,0,0,.08)}
h1{font-size:1.5rem;font-weight:700;margin-bottom:.5rem;letter-spacing:-.3px}
p{color:#555;font-size:.95rem;line-height:1.6;margin-bottom:1.5rem}
.spinner{width:32px;height:32px;border:3px solid #e5e7eb;border-top-color:#7B68EE;border-radius:50%;animation:s .6s linear infinite;margin:0 auto 1.25rem}
@keyframes s{to{transform:rotate(360deg)}}
.btn{display:none;width:100%;padding:14px 20px;font-size:1rem;font-weight:700;color:#fff;background:#7B68EE;border:none;border-radius:12px;cursor:pointer;text-decoration:none;font-family:inherit;margin-bottom:.75rem;transition:background .2s}
.btn:hover{background:#6A58DD}
.hint{display:none;font-size:.8rem;color:#888;line-height:1.5}
.show{display:block}
.powered{font-size:.75rem;color:#aaa;margin-top:1.25rem}
.debug{display:none;font-size:.65rem;color:#bbb;margin-top:.75rem;font-family:monospace;word-break:break-all}
.show-debug .debug{display:block}
</style>
<script>
(function(){
  var DEST = 'https://marketodds.ai/smartlink';
  var ua = navigator.userAgent || '';
  var isInApp = /Instagram|FBAN|FBAV|Messenger|Line\/|Snapchat|TikTok|Pinterest|WeChat|LinkedInApp|WebView| wv\)/i.test(ua);

  if (!isInApp) {
    window.location.replace(DEST);
    return;
  }

  var isIOS = /iPhone|iPad|iPod/i.test(ua);
  var isAndroid = /Android/i.test(ua);
  var stripped = DEST.replace(/^https?:\/\//, '');
  var redirected = false;

  function tryRedirect() {
    if (redirected) return;

    if (isIOS) {
      // Method 1: x-safari-https scheme
      var safariUrl = 'x-safari-https://' + stripped;
      window.location.href = safariUrl;

      // Method 2: after 800ms, try Shortcuts fallback if still here
      setTimeout(function(){
        if (document.hidden) return;
        var id = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
          var r = Math.random() * 16 | 0;
          return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
        });
        window.location.href = 'shortcuts://x-callback-url/run-shortcut?name=' + id + '&x-error=' + encodeURIComponent(DEST);
      }, 800);
    } else if (isAndroid) {
      window.location.href = 'intent://' + stripped + '#Intent;scheme=https;end';
    }
  }

  // Always show fallback after 2.5s no matter what
  setTimeout(function(){ showFallback(); }, 2500);

  tryRedirect();

  function showFallback() {
    document.addEventListener('DOMContentLoaded', reveal);
    if (document.readyState !== 'loading') reveal();
  }

  function reveal() {
    var b = document.getElementById('btn');
    var h = document.getElementById('hint');
    var sp = document.getElementById('spinner');
    if (b) { b.classList.add('show'); b.href = DEST; }
    if (h) h.classList.add('show');
    if (sp) sp.style.display = 'none';
    var t = document.getElementById('title');
    if (t) t.textContent = 'Open in your browser';
    var d = document.getElementById('desc');
    if (d) d.textContent = 'For the best experience, tap the button below or tap ⋯ → Open in Safari.';
  }
})();
</script>
</head>
<body>
<div class="card">
  <div class="spinner" id="spinner"></div>
  <h1 id="title">Redirecting…</h1>
  <p id="desc">Opening MarketOdds in your browser for the best experience.</p>
  <a class="btn" id="btn" href="#">Open in Browser</a>
  <p class="hint" id="hint">Tap <strong>⋯</strong> in the top-right corner → <strong>Open in Safari</strong></p>
  <p class="powered">MarketOdds [.ai]</p>
</div>
</body>
</html>
