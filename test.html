<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarketOdds - Test</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#fafafa;color:#111;display:flex;align-items:center;justify-content:center;height:100vh;text-align:center;padding:1.5rem}
.card{max-width:380px;width:100%;background:#fff;border-radius:20px;padding:2.5rem 2rem;box-shadow:0 8px 24px rgba(0,0,0,.05),0 2px 4px rgba(0,0,0,.08)}
h1{font-size:1.5rem;font-weight:700;margin-bottom:.5rem}
p{color:#555;font-size:.95rem;line-height:1.6;margin-bottom:1rem}
.status{font-size:.8rem;color:#888;font-family:monospace;word-break:break-all;background:#f5f5f5;padding:12px;border-radius:8px;text-align:left;margin-top:1rem}
.btn{display:inline-block;width:100%;padding:14px 20px;font-size:1rem;font-weight:700;color:#fff;background:#7B68EE;border:none;border-radius:12px;cursor:pointer;text-decoration:none;font-family:inherit;margin-top:1rem;transition:background .2s}
</style>
<script>
(function(){
  var ua = navigator.userAgent || '';
  var isInApp = /Instagram|FBAN|FBAV|Messenger|Line\/|Snapchat|TikTok|Pinterest|WeChat|LinkedInApp|WebView| wv\)/i.test(ua);
  var isIOS = /iPhone|iPad|iPod/i.test(ua);

  document.addEventListener('DOMContentLoaded', function(){
    var s = document.getElementById('status');
    s.textContent = 'UA: ' + ua.substring(0, 120) + '\n\nIn-app: ' + isInApp + '\niOS: ' + isIOS + '\nProtocol: ' + location.protocol + '\nOrigin: ' + location.origin;
  });
})();
</script>
</head>
<body>
<div class="card">
  <h1>Debug Page</h1>
  <p>This page shows what Instagram's browser reports.</p>
  <div class="status" id="status">Loading...</div>
  <a class="btn" href="go.html">Test go.html redirect</a>
</div>
</body>
</html>
