<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarketOdds SmartLink - Test</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#f0f0f5;color:#111;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:1.5rem}
.card{max-width:400px;width:100%;background:#fff;border-radius:20px;padding:2.5rem 2rem;box-shadow:0 8px 24px rgba(0,0,0,.05),0 2px 4px rgba(0,0,0,.08)}
h1{font-size:1.6rem;font-weight:700;margin-bottom:.75rem;color:#111}
.badge{display:inline-block;padding:4px 12px;background:#4CAF50;color:#fff;border-radius:20px;font-size:.8rem;font-weight:600;margin-bottom:1rem}
p{color:#555;font-size:.95rem;line-height:1.6;margin-bottom:1rem}
.browser-info{background:#f5f5f5;border-radius:10px;padding:1rem;font-size:.8rem;color:#666;text-align:left;word-break:break-all}
.browser-info strong{color:#111}
</style>
</head>
<body>
<div class="card">
  <div class="badge" id="badge">Checking…</div>
  <h1>SmartLink Test Page</h1>
  <p>If you see this page in <strong>Safari</strong> (not Instagram's browser), the redirect worked!</p>
  <div class="browser-info">
    <p><strong>Browser:</strong> <span id="browser"></span></p>
    <p><strong>In-app:</strong> <span id="inapp"></span></p>
    <p style="margin:0"><strong>Source:</strong> <span id="source"></span></p>
  </div>
</div>
<script>
var ua = navigator.userAgent;
var isInApp = /Instagram|FBAN|FBAV|Messenger|Snapchat|TikTok/i.test(ua);
document.getElementById('browser').textContent = ua.substring(0, 120) + '…';
document.getElementById('inapp').textContent = isInApp ? 'YES — still in-app browser' : 'NO — native browser!';
document.getElementById('source').textContent = new URLSearchParams(window.location.search).get('browser') || 'direct';
var badge = document.getElementById('badge');
if (isInApp) {
  badge.textContent = 'In-App Browser';
  badge.style.background = '#ef4444';
} else {
  badge.textContent = 'Native Browser ✓';
  badge.style.background = '#4CAF50';
}
</script>
</body>
</html>
